<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Mood Constellation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
        }
        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
        }
        nav {
            margin: 20px 0;
        }
        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #333;
            padding: 10px 15px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.7);
            transition: background 0.3s;
        }
        nav a:hover {
            background: rgba(255, 255, 255, 0.9);
        }
        .panel {
            display: flex;
            justify-content: space-around;
            margin: 20px;
        }
        .mood-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .mood {
            padding: 20px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.5);
            transition: transform 0.3s;
        }
        .mood:hover {
            transform: scale(1.05);
        }
        .slider {
            width: 100%;
        }
        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #45a049;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
            padding-top: 60px;
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
        }
    </style>
</head>
<body>
<header>
    <h1>Global Mood Constellation</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>
<div class="panel">
    <div class="mood-grid">
        <div class="mood">Happy</div>
        <div class="mood">Sad</div>
        <div class="mood">Neutral</div>
        <div class="mood">Excited</div>
        <div class="mood">Anxious</div>
        <div class="mood">Calm</div>
    </div>
</div>
<div>
    <input type="range" class="slider" min="0" max="10">
    <button onclick="openModal()">Submit</button>
</div>
<div id="myModal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal()" style="float:right;cursor:pointer;">&times;</span>
        <p>Your mood has been recorded!</p>
    </div>
</div>
<script>
    function openModal() {
        document.getElementById('myModal').style.display = 'block';
    }
    function closeModal() {
        document.getElementById('myModal').style.display = 'none';
    }
    window.onclick = function(event) {
        if (event.target == document.getElementById('myModal')) {
            closeModal();
        }
    }
</script>
</body>
</html>
